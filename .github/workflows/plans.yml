name: 爬取招生计划数据

run-name: >-
  招生计划 ${{ inputs.current_year || 'auto' }}
  ${{ inputs.current_shard || 'upper' }}
  ${{ inputs.mode || 'test' }}

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '爬取模式'
        required: true
        type: choice
        options:
          - test
          - sample
          - full
        default: test
      years:
        description: '年份范围（可选，如：2025,2024,2023 或 2021-2025）'
        required: false
        type: string
        default: ''
      current_year:
        description: '当前执行年份（链式调度自动填写，手动运行通常留空）'
        required: false
        type: string
        default: ''
      current_shard:
        description: '当前执行分片（upper=上半，lower=下半）'
        required: false
        type: choice
        options:
          - upper
          - lower
        default: upper

  schedule:
    - cron: '0 2 1 * *'

permissions:
  contents: write
  actions: write

concurrency:
  group: crawl-plans-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: 设置Python环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建数据目录
        run: |
          mkdir -p data/plans
          mkdir -p data/plans_progress
          mkdir -p data/plans_progress/completed

      - name: 检查学校数据
        shell: bash
        run: |
          set -euo pipefail

          if [ -d data/schools ]; then
            FIRST_JSON="$(find data/schools -type f -name '*.json' -print -quit)"
            test -n "$FIRST_JSON" || (echo "data/schools 下没有学校 JSON 文件" && exit 1)
            echo "检测到学校目录文件: $FIRST_JSON"
          elif [ -f data/schools.json ]; then
            echo "检测到学校索引文件: data/schools.json"
          else
            echo "缺少 data/schools 或 data/schools.json，请先更新学校数据"
            exit 1
          fi

      - name: 解析当前执行上下文
        id: plan_context
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_YEARS: ${{ github.event.inputs.years }}
          INPUT_CURRENT_YEAR: ${{ github.event.inputs.current_year }}
          INPUT_CURRENT_SHARD: ${{ github.event.inputs.current_shard }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "schedule" ]; then
            MODE="full"
            RAW_YEARS="${INPUT_YEARS:-}"
            CURRENT_YEAR=""
            CURRENT_SHARD="upper"
          else
            MODE="${INPUT_MODE:-test}"
            RAW_YEARS="${INPUT_YEARS:-}"
            CURRENT_YEAR="${INPUT_CURRENT_YEAR:-}"
            CURRENT_SHARD="${INPUT_CURRENT_SHARD:-upper}"
          fi

          mapfile -t YEAR_LIST < <(bash scripts/resolve_years.sh "$RAW_YEARS" "$MODE")

          if [ "${#YEAR_LIST[@]}" -eq 0 ]; then
            echo "没有可执行年份"
            exit 1
          fi

          YEAR_CSV="$(IFS=,; echo "${YEAR_LIST[*]}")"

          python scripts/plan_chain.py             --years "$YEAR_CSV"             --current-year "$CURRENT_YEAR"             --current-shard "$CURRENT_SHARD"             --github-output "$GITHUB_OUTPUT"

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "years_csv=$YEAR_CSV" >> "$GITHUB_OUTPUT"

      - name: 执行当前年份分片
        id: plan_run
        shell: bash
        env:
          PLAN_YEAR: ${{ steps.plan_context.outputs.current_year }}
          PLAN_SHARD: ${{ steps.plan_context.outputs.current_shard }}
          PLAN_MODE: ${{ steps.plan_context.outputs.mode }}
        run: |
          set -euo pipefail

          export DB_ENABLED=false
          export CRAWL_MODE="$PLAN_MODE"
          export PLAN_YEARS="$PLAN_YEAR"
          export PLAN_SCHOOL_SHARD="$PLAN_SHARD"
          export PLAN_PROGRESS_FILE="data/plans_progress/${PLAN_YEAR}.${PLAN_SHARD}.json"
          export PLAN_PROGRESS_DIR="data/plans_progress"
          export PLAN_COMPLETED_DIR="data/plans_progress/completed"
          export PLAN_DATA_DIR="data/plans"
          export SCHOOL_DATA_DIR="data/schools"
          export SCHOOL_DATA_FILE="data/schools.json"
          export PLAN_SKIP_EXISTING=true
          export PLAN_DEBUG=false
          export PLAN_MAX_SCHOOLS_PER_RUN=0
          export PLAN_PROVINCE_WORKERS=4

          case "$PLAN_MODE" in
            test)
              export SAMPLE_SCHOOLS=99999
              ;;
            sample)
              export SAMPLE_SCHOOLS=99999
              ;;
            full)
              export SAMPLE_SCHOOLS=99999
              ;;
            *)
              echo "未知模式: $PLAN_MODE"
              exit 1
              ;;
          esac

          python scripts/run_plans_once.py             --year "$PLAN_YEAR"             --shard "$PLAN_SHARD"             --mode "$PLAN_MODE"             --github-output "$GITHUB_OUTPUT"

      - name: 提交结果
        id: commit_changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A data/plans data/plans_progress

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "本轮没有文件变化"
            exit 0
          fi

          git commit -m "📊 招生计划 [${{ steps.plan_context.outputs.current_year }}] [${{ steps.plan_context.outputs.current_shard }}] [${{ steps.plan_context.outputs.mode }}] #${{ github.run_number }}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: 计算下一次调度
        id: next_run
        shell: bash
        env:
          RUN_STATUS: ${{ steps.plan_run.outputs.run_status }}
          CURRENT_YEAR: ${{ steps.plan_context.outputs.current_year }}
          CURRENT_SHARD: ${{ steps.plan_context.outputs.current_shard }}
          NEXT_YEAR: ${{ steps.plan_context.outputs.next_year }}
          NEXT_SHARD: ${{ steps.plan_context.outputs.next_shard }}
        run: |
          set -euo pipefail

          SHOULD_DISPATCH=false
          TARGET_YEAR=""
          TARGET_SHARD=""

          case "$RUN_STATUS" in
            partial|paused)
              SHOULD_DISPATCH=true
              TARGET_YEAR="$CURRENT_YEAR"
              TARGET_SHARD="$CURRENT_SHARD"
              ;;
            done)
              if [ -n "$NEXT_YEAR" ] && [ -n "$NEXT_SHARD" ]; then
                SHOULD_DISPATCH=true
                TARGET_YEAR="$NEXT_YEAR"
                TARGET_SHARD="$NEXT_SHARD"
              fi
              ;;
            skipped)
              if [ -n "$NEXT_YEAR" ] && [ -n "$NEXT_SHARD" ]; then
                SHOULD_DISPATCH=true
                TARGET_YEAR="$NEXT_YEAR"
                TARGET_SHARD="$NEXT_SHARD"
              fi
              ;;
            *)
              echo "未识别状态: $RUN_STATUS"
              ;;
          esac

          echo "should_dispatch=$SHOULD_DISPATCH" >> "$GITHUB_OUTPUT"
          echo "target_year=$TARGET_YEAR" >> "$GITHUB_OUTPUT"
          echo "target_shard=$TARGET_SHARD" >> "$GITHUB_OUTPUT"

      - name: 调度下一次运行
        if: steps.next_run.outputs.should_dispatch == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          bash scripts/dispatch_next_run.sh             .github/workflows/crawl_plans.yml             "${GITHUB_REF_NAME}"             "${{ steps.plan_context.outputs.mode }}"             "${{ steps.plan_context.outputs.years_csv }}"             "${{ steps.next_run.outputs.target_year }}"             "${{ steps.next_run.outputs.target_shard }}"
